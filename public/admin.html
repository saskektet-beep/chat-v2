<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><title>Admin Console</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --danger: #ef4444; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; max-width: 1200px; margin: 0 auto; }
        .section { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #334155; }
        .chat-log { background: #020617; padding: 15px; border-radius: 12px; display: flex; flex-direction: column; gap: 10px; max-height: 400px; overflow-y: auto; }
        .bubble { padding: 10px; border-radius: 10px; font-size: 13px; max-width: 90%; }
        .rep { background: #1e3a8a; align-self: flex-end; }
        .tar { background: #334155; align-self: flex-start; }
        button { border: none; border-radius: 8px; padding: 8px 15px; cursor: pointer; font-weight: bold; }
        .ban-btn { background: var(--danger); color: white; font-size: 10px; }
        input { padding: 12px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; }
    </style>
</head>
<body>
    <div id="auth" style="text-align:center; margin-top:100px;">
        <h2>🔐 Вход</h2>
        <input type="password" id="pass" placeholder="Пароль">
        <button onclick="socket.emit('admin_login', document.getElementById('pass').value)" style="background:var(--accent)">Войти</button>
    </div>
    <div id="content" style="display:none">
        <h1>Dashboard</h1>
        <div class="grid">
            <div class="section">
                <h2>🚨 Жалобы (<span id="repCount">0</span>)</h2>
                <div id="reports"></div>
            </div>
            <div class="section">
                <h2>🚫 Бан-лист</h2>
                <div id="banned"></div>
            </div>
        </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        socket.on('admin_access', d => { document.getElementById('auth').style.display='none'; document.getElementById('content').style.display='block'; render(d); });
        socket.on('admin_update', d => render(d));
        function render(data) {
            const rDiv = document.getElementById('reports'), bDiv = document.getElementById('banned');
            document.getElementById('repCount').innerText = data.reports.length;
            rDiv.innerHTML = ''; bDiv.innerHTML = '';
            data.reports.forEach(r => {
                let logs = r.chatLog.map(m => `
                    <div class="bubble ${m.id === r.reporterId ? 'rep' : 'tar'}">
                        <div style="display:flex; justify-content:space-between; gap:10px;">
                            <b>${m.nick}</b>
                            <button class="ban-btn" onclick="socket.emit('admin_ban_target', '${m.ip}')">BAN</button>
                        </div>
                        <div>${m.text}</div>
                        <div style="font-size:9px; opacity:0.5; margin-top:5px; text-align:right;">${m.time} | IP: ${m.ip}</div>
                    </div>`).join('');
                rDiv.innerHTML += `
                    <div style="margin-bottom:20px; border-bottom:1px solid #334155; padding-bottom:10px;">
                        <small>От: ${r.reporterNick} | IP: ${r.targetIP}</small>
                        <div class="chat-log">${logs}</div>
                        <button style="width:100%; margin-top:10px; background:#334155; color:white;" onclick="socket.emit('admin_close_report', ${r.id})">Удалить жалобу</button>
                    </div>`;
            });
            data.banned.forEach(ip => { bDiv.innerHTML += `<div style="padding:10px; background:#0f172a; margin-bottom:5px; display:flex; justify-content:space-between;">📍 ${ip} <button onclick="socket.emit('admin_unban', '${ip}')" style="background:#22c55e; color:white;">РАЗБАН</button></div>`; });
        }
    </script>
</body>
</html>
