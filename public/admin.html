<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><title>Admin Console</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --danger: #ef4444; --warning: #f39c12; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; max-width: 1200px; margin: 0 auto; }
        .section { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #334155; }
        .chat-log { background: #020617; padding: 15px; border-radius: 12px; display: flex; flex-direction: column; gap: 10px; max-height: 400px; overflow-y: auto; }
        .bubble { padding: 10px; border-radius: 10px; font-size: 13px; max-width: 90%; }
        .rep { background: #1e3a8a; align-self: flex-end; }
        .tar { background: #334155; align-self: flex-start; }
        button { border: none; border-radius: 8px; padding: 8px 15px; cursor: pointer; font-weight: bold; }
        .ban-btn { font-size: 10px; color: white; margin-left: 5px; }
        .btn-ip { background: var(--danger); }
        .btn-id { background: var(--warning); }
        input { padding: 12px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; }
        .ban-item { padding: 10px; background: #0f172a; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
    </style>
</head>
<body>
    <div id="auth" style="text-align:center; margin-top:100px;">
        <h2>🔐 Вход</h2>
        <input type="password" id="pass" placeholder="Пароль">
        <button onclick="socket.emit('admin_login', document.getElementById('pass').value)" style="background:var(--accent)">Войти</button>
    </div>
    <div id="content" style="display:none">
        <h1>Dashboard</h1>
        <div class="grid">
            <div class="section">
                <h2>🚨 Жалобы (<span id="repCount">0</span>)</h2>
                <div id="reports"></div>
            </div>
            <div class="section">
                <h2>🚫 Бан-лист</h2>
                <h4>По IP:</h4>
                <div id="bannedIps"></div>
                <h4>По ID устройства:</h4>
                <div id="bannedIds"></div>
            </div>
        </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        socket.on('admin_access', d => { 
            document.getElementById('auth').style.display='none'; 
            document.getElementById('content').style.display='block'; 
            render(d); 
        });
        socket.on('admin_update', d => render(d));

        function render(data) {
            const rDiv = document.getElementById('reports'), 
                  biDiv = document.getElementById('bannedIps'),
                  bdDiv = document.getElementById('bannedIds');
                  
            document.getElementById('repCount').innerText = data.reports.length;
            rDiv.innerHTML = ''; biDiv.innerHTML = ''; bdDiv.innerHTML = '';

            data.reports.forEach(r => {
                let logs = r.chatLog.map(m => `
                    <div class="bubble ${m.id === r.targetId ? 'tar' : 'rep'}">
                        <div style="display:flex; justify-content:space-between; align-items:center; gap:10px;">
                            <b>${m.nick}</b>
                            <div>
                                <button class="ban-btn btn-ip" onclick="socket.emit('admin_ban_target', '${m.ip}')">BAN IP</button>
                                <button class="ban-btn btn-id" onclick="socket.emit('admin_ban_id', '${m.id}')">BAN ID</button>
                            </div>
                        </div>
                        <div style="margin-top:5px;">${m.text}</div>
                        <div style="font-size:9px; opacity:0.5; margin-top:5px; text-align:right;">${m.time} | ID: ${m.id}</div>
                    </div>`).join('');

                rDiv.innerHTML += `
                    <div style="margin-bottom:20px; border-bottom:1px solid #334155; padding-bottom:10px;">
                        <small>Жалоба от: ${r.reporterNick} | Цель IP: ${r.targetIP}</small>
                        <div class="chat-log">${logs}</div>
                        <button style="width:100%; margin-top:10px; background:#334155; color:white;" onclick="socket.emit('admin_close_report', ${r.id})">Удалить жалобу</button>
                    </div>`;
            });

            // Список забаненных IP
            (data.bannedIps || []).forEach(ip => { 
                biDiv.innerHTML += `<div class="ban-item">📍 ${ip} <button onclick="socket.emit('admin_unban', '${ip}')" style="background:#22c55e; color:white; padding:5px 10px;">РАЗБАН</button></div>`; 
            });

            // Список забаненных ID
            (data.bannedIds || []).forEach(id => { 
                bdDiv.innerHTML += `<div class="ban-item">📱 ${id} <button onclick="socket.emit('admin_unban_id', '${id}')" style="background:#22c55e; color:white; padding:5px 10px;">РАЗБАН</button></div>`; 
            });
        }
    </script>
</body>
</html>
