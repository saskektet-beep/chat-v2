<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; padding: 20px; }
        .section { background: #1c1c1c; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        .chat-log { background: #000; padding: 10px; border-radius: 10px; display: flex; flex-direction: column; gap: 8px; max-height: 300px; overflow-y: auto; }
        .bubble { padding: 8px; border-radius: 8px; font-size: 13px; max-width: 90%; }
        .rep { background: #0084ff; align-self: flex-end; }
        .tar { background: #3a3b3c; align-self: flex-start; }
        button { border: none; border-radius: 5px; padding: 8px 15px; cursor: pointer; font-weight: bold; }
        .ban-btn { background: #ff4d4d; color: white; font-size: 10px; margin-left: 10px; }
        input { padding: 10px; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="auth" style="text-align:center; margin-top:50px;">
        <h2>Вход Администратора</h2>
        <input type="password" id="pass" placeholder="Пароль">
        <button onclick="socket.emit('admin_login', document.getElementById('pass').value)" style="background:#2ecc71">Войти</button>
    </div>
    <div id="content" style="display:none">
        <div class="section">
            <h2>Жалобы (с аудио)</h2>
            <div id="reports"></div>
        </div>
        <div class="section">
            <h2>Черный список IP</h2>
            <div id="banned"></div>
        </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        socket.on('admin_access', d => { document.getElementById('auth').style.display='none'; document.getElementById('content').style.display='block'; render(d); });
        socket.on('admin_update', d => render(d));

        function render(data) {
            const rDiv = document.getElementById('reports'), bDiv = document.getElementById('banned');
            rDiv.innerHTML = ''; bDiv.innerHTML = '';

            data.reports.forEach(r => {
                let logs = r.chatLog.map(m => {
                    let content = m.audio 
                        ? `<audio src="${m.audio}" controls style="width:180px;height:30px;filter:invert(1)"></audio>` 
                        : `<span>${m.text}</span>`;
                    return `<div class="bubble ${m.nick === r.reporterNick ? 'rep' : 'tar'}" style="margin-bottom:5px;">
                        <small><b>${m.nick}</b> [${m.ip}]</small> <button class="ban-btn" onclick="socket.emit('admin_ban_target', '${m.ip}')">BAN IP</button><br>${content}
                    </div>`;
                }).join('');

                rDiv.innerHTML += `<div class="card" style="border-bottom:1px solid #444; padding:10px 0;">
                    <small>От: ${r.reporterNick} | ${r.time}</small>
                    <div class="chat-log">${logs}</div>
                    <button style="width:100%; margin-top:5px; background:#444; color:#fff" onclick="socket.emit('admin_close_report', ${r.id})">Закрыть жалобу</button>
                </div>`;
            });

            data.banned.forEach(ip => { 
                bDiv.innerHTML += `<div style="padding:10px; background:#222; margin-bottom:5px; display:flex; justify-content:space-between;">${ip} <button onclick="socket.emit('admin_unban', '${ip}')" style="background:#2ecc71; color:white; padding:2px 10px;">РАЗБАН</button></div>`; 
            });
        }
    </script>
</body>
</html>
